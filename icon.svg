<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e183a" />
      <stop offset="50%" stop-color="#0e0a1f" />
      <stop offset="100%" stop-color="#05030b" />
    </linearGradient>
    
    <!-- Accent Gradient for the quill and logo -->
    <linearGradient id="accent-grad" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- Secondary Accent Gradient for the ink path -->
    <linearGradient id="sec-grad" x1="120" y1="350" x2="350" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Outer Rounded Square Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <rect x="8" y="8" width="496" height="496" rx="104" stroke="#ffffff" stroke-opacity="0.08" stroke-width="6" />

  <!-- Centered Intertwined C and Quill Emblem -->
  <g transform="translate(96, 96) scale(13.333)">
    <!-- Slanted C shape -->
    <path d="M15 4c-3.5 0-7 2.5-8.5 6s-.5 7.5 2 10 7 1.5 8.5-.5" stroke="url(#accent-grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Slanted Quill Nib & Feather -->
    <path d="M9 15c.5-2.5 2-5.5 4.5-8 3-3 6.5-4 7.5-3s0 4.5-3 7.5c-2.5 2.5-5.5 4-8 4.5z" stroke="url(#accent-grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="url(#accent-grad)" fill-opacity="0.1" />
    <path d="M13.5 10.5l6-6" stroke="url(#accent-grad)" stroke-width="1.5" stroke-linecap="round" />
    <!-- Slanted ink draw line -->
    <path d="M9 15l-6 6" stroke="url(#sec-grad)" stroke-width="1.8" stroke-linecap="round" />
    <circle cx="3" cy="21" r="0.8" fill="#06b6d4" />
  </g>
</svg>
